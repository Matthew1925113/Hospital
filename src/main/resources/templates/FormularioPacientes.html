<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${paciente.id} == null ? 'Nuevo Paciente' : 'Editar Paciente'">Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        body {
            background: linear-gradient(135deg, #00b4d8 0%, #0096c7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
 
        .container-form {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
 
        .header-form {
            display: flex;
            align-items: center;
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 3px solid #00b4d8;
        }
 
        .header-form i {
            font-size: 40px;
            color: #00b4d8;
            margin-right: 15px;
        }
 
        .header-form h1 {
            font-size: 28px;
            color: #333;
            margin: 0;
            font-weight: 700;
        }
 
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #f5c6cb;
            display: none;
        }
 
        .error-message[th-if] {
            display: block;
        }
 
        .form-group {
            margin-bottom: 20px;
        }
 
        .form-group label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: block;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
 
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
 
        .form-group input:focus {
            outline: none;
            border-color: #00b4d8;
            box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.1);
            background-color: #fafafa;
        }
 
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
 
        .form-row .form-group {
            margin-bottom: 0;
        }
 
        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #00b4d8;
            text-transform: uppercase;
            margin-top: 25px;
            margin-bottom: 15px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
            letter-spacing: 1px;
        }
 
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 35px;
            justify-content: space-between;
        }
 
        .btn-guardar {
            flex: 1;
            padding: 13px 25px;
            background: linear-gradient(135deg, #00b4d8 0%, #0096c7 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 5px 15px rgba(0, 180, 216, 0.3);
        }
 
        .btn-guardar:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 180, 216, 0.4);
        }
 
        .btn-guardar:active {
            transform: translateY(0);
        }
 
        .btn-cancelar {
            padding: 13px 25px;
            background: #e0e0e0;
            color: #333;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
 
        .btn-cancelar:hover {
            background: #d0d0d0;
            color: #333;
            text-decoration: none;
        }
 
        @media (max-width: 600px) {
            .container-form {
                padding: 25px;
            }
 
            .form-row {
                grid-template-columns: 1fr;
            }
 
            .header-form h1 {
                font-size: 22px;
            }
 
            .button-group {
                flex-direction: column;
            }
 
            .btn-cancelar {
                width: 100%;
            }
        }
 
        /* Animación de entrada */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
 
        .container-form {
            animation: slideIn 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div class="container-form">
        <div class="header-form">
            <i class="fas fa-user-injured"></i>
            <h1 th:text="${paciente.id} == null ? 'Nuevo Paciente' : 'Editar Paciente'">Paciente</h1>
        </div>
 
        <p class="error-message" th:if="${error}" th:text="${error}"></p>
 
        <form action="/GuardarPaciente" th:object="${paciente}" method="post">
            <input type="hidden" th:field="*{id}" />
 
            <!-- Sección Datos Personales -->
            <div class="section-title">
                <i class="fas fa-id-card"></i> Datos Personales
            </div>
 
            <div class="form-row">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" th:field="*{nombre}" placeholder="Ej: María" required />
                </div>
                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" th:field="*{apellido}" placeholder="Ej: García" required />
                </div>
            </div>
 
            <div class="form-row">
                <div class="form-group">
                    <label for="cedula">Cédula</label>
                    <input type="text" id="cedula" th:field="*{cedula}" placeholder="Ej: 987654321" required />
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" th:field="*{email}" placeholder="Ej: paciente@hospital.com" required />
                </div>
            </div>
 
            <!-- Sección Contacto -->
            <div class="section-title">
                <i class="fas fa-phone"></i> Información de Contacto
            </div>
 
            <div class="form-group">
                <label for="direccion">Dirección</label>
                <input type="text" id="direccion" th:field="*{direccion}" placeholder="Ej: Avenida Salud 456" required />
            </div>
 
            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" th:field="*{telefono}" placeholder="Ej: +1987654321" required />
            </div>
 
            <!-- Botones -->
            <div class="button-group">
                <button type="submit" class="btn-guardar">
                    <i class="fas fa-save"></i> Guardar
                </button>
                <a href="/pacientes" class="btn-cancelar">
                    <i class="fas fa-times"></i> Cancelar
                </a>
            </div>
        </form>
    </div>
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
