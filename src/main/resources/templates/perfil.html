<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page-wrapper">
        <main class="main-content" role="main">
            <div class="container">
                <div class="page-header">
                    <h1>Mi perfil</h1>
                </div>

                <div class="card">
                    <div class="card-body">
                        <form th:action="@{/actualizarPerfil}" th:object="${usuario}" method="post">
                            <input type="hidden" th:field="*{id}">

                            <div class="form-group">
                                <label class="form-label" for="nombre">Nombre</label>
                                <input class="form-input" type="text" id="nombre" th:field="*{nombre}" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="email">Email</label>
                                <input class="form-input" type="email" id="email" th:field="*{email}" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="password">Nueva contraseña</label>
                                <input class="form-input" type="password" id="password" name="password" placeholder="Deja vacío para no cambiarla">
                            </div>

                            <div style="display:flex; gap:0.75rem; margin-top:1.5rem;">
                                <button type="submit" class="btn btn-primary">Guardar cambios</button>
                                <a th:href="@{/inicio}" class="btn btn-outline">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
