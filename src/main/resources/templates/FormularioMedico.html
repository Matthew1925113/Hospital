<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${medico.id} == null ? 'Nuevo Médico' : 'Editar Médico'">Médico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" yh:href="@{/css/style.css}">

</head>
<body>
    <div class="container-form">
        <div class="header-form">
            <i class="fas fa-user-md"></i>
            <h1 th:text="${medico.id} == null ? 'Nuevo Médico' : 'Editar Médico'">Médico</h1>
        </div>
 
        <p class="error-message" th:if="${error}" th:text="${error}"></p>
 
        <form action="/GuardarMedico" th:object="${medico}" method="post">
            <input type="hidden" th:field="*{id}" />
 
            <!-- Sección Datos Personales -->
            <div class="section-title">
                <i class="fas fa-id-card"></i> Datos Personales
            </div>
 
            <div class="form-row">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" th:field="*{nombre}" placeholder="Ej: Juan" required />
                </div>
                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" th:field="*{apellido}" placeholder="Ej: Pérez" required />
                </div>
            </div>
 
            <div class="form-row">
                <div class="form-group">
                    <label for="cedula">Cédula</label>
                    <input type="text" id="cedula" th:field="*{cedula}" placeholder="Ej: 123456789" required />
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" th:field="*{email}" placeholder="Ej: medico@hospital.com" required />
                </div>
            </div>
 
            <!-- Sección Contacto -->
            <div class="section-title">
                <i class="fas fa-phone"></i> Información de Contacto
            </div>
 
            <div class="form-group">
                <label for="direccion">Dirección</label>
                <input type="text" id="direccion" th:field="*{direccion}" placeholder="Ej: Calle Principal 123" required />
            </div>
 
            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" th:field="*{telefono}" placeholder="Ej: +1234567890" required />
            </div>
 
            <!-- Sección Profesional -->
            <div class="section-title">
                <i class="fas fa-stethoscope"></i> Información Profesional
            </div>
 
            <div class="form-group">
                <label for="especialidad">Especialidad</label>
                <input type="text" id="especialidad" th:field="*{especialidad}" placeholder="Ej: Cardiología" required />
            </div>
 
            <div class="form-group">
                <label for="disponibilidadHoraria">Disponibilidad Horaria</label>
                <input type="text" id="disponibilidadHoraria" th:field="*{disponibilidadHoraria}" placeholder="Ej: Lunes a Viernes 8:00 AM - 5:00 PM" required />
            </div>
 
            <!-- Botones -->
            <div class="button-group">
                <button type="submit" class="btn-guardar">
                    <i class="fas fa-save"></i> Guardar
                </button>
                <a href="/medicos" class="btn-cancelar">
                    <i class="fas fa-times"></i> Cancelar
                </a>
            </div>
        </form>
    </div>
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
